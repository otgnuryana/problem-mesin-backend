<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet"

</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">

<div class="app-wrapper">

    <!-- Navbar -->
    <nav class="app-header navbar navbar-expand bg-body">
        <div class="container-fluid">
            <span class="navbar-brand m-2">
                <h2>Chart</h2>
            </span>
        </div>
    </nav>

    <!-- Sidebar -->
    <aside class="app-sidebar bg-body-secondary shadow">

        <div class="sidebar-brand">

            <nav class="mt-2">

                    data-lte-toggle="treeview">

                    <li class="nav-item">

                        </a>
                    </li>

                    <li class="nav-item">

                    </li>

                </ul>

            </nav>

    <!-- Main Content -->

        </div>

        <div class="app-content">
        <div class="card m-2">

    </div>

        <canvas id="toyotaChart"></canvas>
    </div>
</div>

        Daihatsu
    </div>

    </div>
</div>

<div class="card m-2">
    <div class="card-header">

    </div>

</div>

<div class="card m-2">
    <div class="card-header">

    </div>

</div>

<div class="card m-2">
    <div class="card-header">
        Domestik
    </div>

    </div>
</div>

        </div>

</div>
