<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target</title>
    <link rel="stylesheet" href="/pkg/css/bootstrap.min.css">
      <link rel="stylesheet"
      href="/adminlte/dist/css/adminlte.min.css">
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">

<div class="app-wrapper">

    <!-- Navbar -->
    <nav class="app-header navbar navbar-expand bg-body">
        <div class="container-fluid">
            <span class="navbar-brand m-2">
                <h2>Master Target</h2>
            </span>
        </div>
    </nav>

    <!-- Sidebar -->
    <aside class="app-sidebar bg-body-secondary shadow">

        <div class="sidebar-brand">
            <a href="#" class="brand-link text-decoration-none">
                <span class="brand-text fw-light">
                    Maintenance
                </span>
            </a>
        </div>

        <div class="sidebar-wrapper">

            <nav class="mt-2">

                <ul class="nav sidebar-menu flex-column"
                    data-lte-toggle="treeview">

                    <li class="nav-item">
                        <a href="/" class="nav-link">
                            <p>Dashboard</p>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="/grafik" class="nav-link">
                            <p>Chart</p>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="/target" class="nav-link active">
                            <p>Target</p>
                        </a>
                    </li>


                </ul>

            </nav>

        </div>

    </aside>

    <!-- Main Content -->
    <main class="app-main">

        <div class="app-content">
 <section class="content pt-3">

            <div class="container-fluid">

                <div class="card">

                    <div class="card-header row mx-0">
                        <div class="col-md-4">
                            <input
                            type="text"
                            id="search"
                            class="form-control"
                            placeholder="Cari Mesin atau Carline">
                        </div>
                        <div class="col-md-8 d-flex justify-content-end">
                            <button
                            id="btnTambah"
                            class="btn btn-primary"
                            data-bs-toggle="modal"
                            data-bs-target="#targetModal">
                            Tambah Mesin
                        </button>
                        </div>
                        

                        
                    </div>

                    <div class="card-body">

                        <table class="table table-bordered">

                            <thead>

                                <tr>

                                    <th>No</th>
                                    <th>Carline</th>
                                    <th>Mesin</th>
                                    <th>Target</th>
                                    <th>Aksi</th>

                                </tr>

                            </thead>

                            <tbody id="tableBody">

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </section>
        </div>

    </main>

</div>
<div class="modal fade" id="targetModal">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">
                <h5 id="modalTitle">Tambah Mesin</h5>
            </div>

            <div class="modal-body">

                <div class="mb-3">
                    <label>Carline</label>

                    <select id="carline" class="form-control">

                        <option>Toyota</option>
                        <option>Daihatsu</option>
                        <option>Honda</option>
                        <option>Mitsubishi</option>
                        <option>Domestik</option>
                        <option>Other</option>

                    </select>
                </div>

                <div class="mb-3">

                    <label>Mesin</label>

                    <input
                        id="mesin"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label>Target</label>

                    <input
                        id="target"
                        type="number"
                        class="form-control">

                </div>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Batal

                </button>

                <button
                    class="btn btn-primary"
                    id="btnSimpan">

                    Simpan

                </button>

            </div>

        </div>

    </div>

</div>

<script src="/pkg/js/target.js"></script>
<script src="/pkg/js/bootstrap.bundle.min.js"></script>
<script src="/adminlte/dist/js/adminlte.min.js"></script>

</body>
</html>
